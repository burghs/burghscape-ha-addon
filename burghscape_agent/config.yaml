name: Burghscape Agent
description: Central monitoring agent for Burghscape smart home management platform
version: "0.2.20"
slug: burghscape_agent
arch:
- aarch64
- amd64
- armhf
- armv7
- i386
url: https://mybeacon.co.za
startup: application
boot: auto
host_network: true
ingress: true
ingress_port: 8127
panel_icon: mdi:shield-home
panel_title: Burghscape Agent
map:
- config:rw
- ssl:ro
options:
  platform_url: ''
  subscription_token: ''
  instance_name: ''
  heartbeat_interval: 300
  monitor_entities: true
  monitor_disk: true
  monitor_automations: true
  monitor_updates: true
  monitor_backups: false
  monitor_frigate: false
  report_days: 30
  ha_token: ''
  backup_enabled: false
  backup_interval_hours: 24
  backup_sftp_host: ''
  backup_sftp_user: 'kenny'
  backup_sftp_path: '/home/kenny/client-backups'
  backup_ssh_key: ''
  tailscale_authkey: ''
  backup_keep_count: 3
schema:
  platform_url: url
  subscription_token: password
  instance_name: str
  heartbeat_interval: int(60,3600)
  monitor_entities: bool
  monitor_disk: bool
  monitor_automations: bool
  monitor_updates: bool
  monitor_backups: bool
  monitor_frigate: bool
  report_days: int(1,365)
  ha_token: password
  backup_enabled: bool
  backup_interval_hours: int(1,168)
  backup_sftp_host: str
  backup_sftp_user: str
  backup_sftp_path: str
  backup_ssh_key: password
  tailscale_authkey: password
  backup_keep_count: int(1,30)
